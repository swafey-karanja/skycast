[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Proxy: /api/* → serverless function
# force = true ensures this fires before the SPA catch-all below
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/proxy/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
